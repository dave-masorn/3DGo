<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth 3D Rope Wave Grid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: sans-serif;
            color: #94a3b8;
            user-select: none;
        }
        canvas {
            display: block;
            cursor: grab;
            width: 100vw;
            height: 100vh;
        }
        canvas:active {
            cursor: grabbing;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="info">
    <strong>Upgraded 3D Engine:</strong><br>
    • Click intersections for <b>4D rope waves</b><br>
    • Drag to rotate (now with <b>smooth inertia friction</b>)<br>
    • Use <b>Mouse Scroll Wheel</b> to zoom smoothly
</div>

<canvas id="ropeCanvas"></canvas>

<script>
const canvas = document.getElementById('ropeCanvas');
const ctx = canvas.getContext('2d');

// --- 1. Grid Specifications ---
const COLS = 35; 
const ROWS = 35;
const SPACING = 20; 
let activeWaves = [];

// --- 2. Smooth Interaction Camera State ---
let angleX = 55 * Math.PI / 180;   // Target pitch orientation
let angleZ = -45 * Math.PI / 180;  // Target yaw rotation
let currentAngleX = angleX;         // Interpolated rendering positions
let currentAngleZ = angleZ;
let zoom = 1.0;                     // Target viewport zoom level
let currentZoom = zoom;             // Interpolated zoom position

let isDragging = false;
let startX, startY;
let totalDragDistance = 0;

function resize() {
    // Sharp high-DPI retina display support handling
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

// --- 3. 3D Geometric Projections with Zoom Scaling ---
function project(gridX, gridY, h) {
    const cx = (gridX - COLS / 2) * SPACING;
    const cy = (gridY - ROWS / 2) * SPACING;

    // Evaluate rotations with smoothed inertial angle configurations
    const rx = cx * Math.cos(currentAngleZ) - cy * Math.sin(currentAngleZ);
    const ry = cx * Math.sin(currentAngleZ) + cy * Math.cos(currentAngleZ);

    // Apply explicit physical perspective zoom factor scale adjustments
    const screenX = (rx * currentZoom) + (window.innerWidth / 2);
    const screenY = ((ry * Math.sin(currentAngleX) - h * Math.cos(currentAngleX)) * currentZoom) + (window.innerHeight / 2);

    return { x: screenX, y: screenY };
}

// --- 4. Responsive Event Listeners ---
window.addEventListener('mousedown', (e) => {
    isDragging = true;
    totalDragDistance = 0;
    startX = e.clientX;
    startY = e.clientY;
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    totalDragDistance += Math.sqrt(dx * dx + dy * dy);
    
    // Shift target coordinates smoothly
    angleZ += dx * 0.005;
    angleX = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, angleX - dy * 0.005));
    
    startX = e.clientX;
    startY = e.clientY;
});

window.addEventListener('mouseup', (e) => {
    isDragging = false;
    
    // If the cursor shifted more than 5px, assume the user was spinning the 3D plane
    if (totalDragDistance > 5) return; 

    // Find clicked intersection matching matrix coordinates
    let closestGridX = -1;
    let closestGridY = -1;
    let minDist = Infinity;

    for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
            const pt = project(x, y, 0); 
            const dx = e.clientX - pt.x;
            const dy = e.clientY - pt.y;
            const d = dx * dx + dy * dy;
            
            if (d < minDist) {
                minDist = d;
                closestGridX = x;
                closestGridY = y;
            }
        }
    }

    // Trigger wave packet
    if (minDist < 1200) {
        activeWaves.push({
            originX: closestGridX,
            originY: closestGridY,
            distance: 0,
            maxDistance: Math.max(COLS, ROWS), 
            speed: 0.5,
            amplitude: 50,
            wavelength: 7,
            decay: 0.96
        });
    }
});

// Dynamic Scroll Wheel Zoom Action Handler
window.addEventListener('wheel', (e) => {
    e.preventDefault(); // Stop standard default page text scrolls
    // Increments exponentially for uniform scaling feel
    if (e.deltaY < 0) {
        zoom = Math.min(2.5, zoom * 1.1);
    } else {
        zoom = Math.max(0.3, zoom / 1.1);
    }
}, { passive: false });

// --- 5. Frame Math Rendering Loops ---
function animate() {
    // Smooth Interpolation Math (Inertial Damping Engine)
    // Lerp (Linear Interpolation) gives heavy cinematic slide sensations to cursor actions
    currentAngleX += (angleX - currentAngleX) * 0.12;
    currentAngleZ += (angleZ - currentAngleZ) * 0.12;
    currentZoom += (zoom - currentZoom) * 0.12;

    // Progress active wave positions
    for (let i = activeWaves.length - 1; i >= 0; i--) {
        const wave = activeWaves[i];
        wave.distance += wave.speed;
        wave.amplitude *= wave.decay;

        if (wave.amplitude < 0.1 || wave.distance > wave.maxDistance + wave.wavelength) {
            activeWaves.splice(i, 1);
        }
    }

    // Clear Frame Screen Canvas
    ctx.fillStyle = '#0b0f19';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

    // Build the heights layout structure
    const heightMap = Array(COLS).fill(0).map(() => Array(ROWS).fill(0));

    for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
            let totalHeight = 0;

            activeWaves.forEach(wave => {
                if (x === wave.originX || y === wave.originY) {
                    const distFromOrigin = Math.abs(x - wave.originX) + Math.abs(y - wave.originY);
                    const waveFront = wave.distance;
                    const waveTail = waveFront - wave.wavelength;

                    if (distFromOrigin <= waveFront && distFromOrigin >= waveTail) {
                        const progress = (distFromOrigin - waveTail) / wave.wavelength;
                        const envelope = Math.sin(progress * Math.PI);
                        const sineWave = Math.sin((distFromOrigin - waveFront) * (Math.PI * 2 / wave.wavelength));
                        
                        totalHeight += sineWave * wave.amplitude * envelope;
                    }
                }
            });

            heightMap[x][y] = totalHeight;
        }
    }

    ctx.lineWidth = 1.2;

    // Draw grid vectors (Columns)
    for (let x = 0; x < COLS; x++) {
        ctx.beginPath();
        for (let y = 0; y < ROWS; y++) {
            const pt = project(x, y, heightMap[x][y]);
            if (y === 0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
        }
        ctx.strokeStyle = '#1e293b';
        ctx.stroke();
    }

    // Draw grid vectors (Rows)
    for (let y = 0; y < ROWS; y++) {
        ctx.beginPath();
        for (let x = 0; x < COLS; x++) {
            const pt = project(x, y, heightMap[x][y]);
            if (x === 0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
        }
        ctx.strokeStyle = '#1e293b';
        ctx.stroke();
    }

    // Paint active traveling glowing waves components
    for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
            const h = heightMap[x][y];
            if (Math.abs(h) > 0.4) {
                const pt = project(x, y, h);
                ctx.fillStyle = `rgba(0, 229, 255, ${Math.min(1, Math.abs(h) / 8)})`;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 2 * currentZoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    requestAnimationFrame(animate);
}

// Initial kickoff invocation
animate();
</script>

</body>
</html>

<svg width="400" height="225" viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510" />
      <stop offset="100%" stop-color="#1a0b2e" />
    </linearGradient>
    
    <linearGradient id="vs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
    
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncR type="linear" slope="1.5" />
        <feFuncG type="linear" slope="0.5" />
        <feFuncB type="linear" slope="2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncR type="linear" slope="0" />
        <feFuncG type="linear" slope="1.5" />
        <feFuncB type="linear" slope="2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Left Side: Human Brain -->
  <g transform="translate(50, 45)" filter="url(#glow-purple)">
    <!-- Brain outline and folds -->
    <path d="M40,20 C55,5 80,10 85,30 C95,35 95,55 80,70 C85,85 65,95 50,85 C35,95 15,85 20,70 C5,55 5,35 15,30 C20,10 45,5 60,20" fill="rgba(168, 85, 247, 0.1)" stroke="#d8b4fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M40,20 C45,35 60,35 60,20" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-linecap="round"/>
    <path d="M25,45 C40,40 50,55 35,65" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-linecap="round"/>
    <path d="M75,45 C60,40 50,55 65,65" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-linecap="round"/>
    <path d="M50,85 C50,70 50,70 50,70" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-linecap="round"/>
    <!-- Neurons glowing -->
    <circle cx="35" cy="45" r="3" fill="#ffffff" />
    <circle cx="65" cy="45" r="3" fill="#ffffff" />
    <circle cx="50" cy="65" r="3" fill="#ffffff" />
    
    <text x="50" y="125" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">HUMAN</text>
  </g>

  <!-- Right Side: AI Microchip -->
  <g transform="translate(250, 45)" filter="url(#glow-cyan)">
    <!-- Chip Body -->
    <rect x="20" y="20" width="60" height="60" rx="6" fill="rgba(14, 165, 233, 0.1)" stroke="#38bdf8" stroke-width="3" stroke-linejoin="round" />
    <!-- Outer Pins -->
    <path d="M10,30 L20,30 M10,50 L20,50 M10,70 L20,70 M80,30 L90,30 M80,50 L90,50 M80,70 L90,70 M30,10 L30,20 M50,10 L50,20 M70,10 L70,20 M30,80 L30,90 M50,80 L50,90 M70,80 L70,90" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <!-- Inner circuitry -->
    <rect x="35" y="35" width="30" height="30" fill="#38bdf8" opacity="0.2" />
    <circle cx="50" cy="50" r="8" fill="#ffffff" />
    <path d="M50,35 L50,42 M50,58 L50,65 M35,50 L42,50 M58,50 L65,50" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    
    <text x="50" y="125" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">AI</text>
  </g>

  <!-- Center VS and Lightning -->
  <g transform="translate(200, 95)" filter="url(#glow-purple)">
    <!-- Lightning bolt behind VS -->
    <path d="M 5,-50 L -25,10 L -5,10 L -15,50 L 25,-10 L 5,-10 Z" fill="#9333ea" opacity="0.3" />
    <!-- VS Text -->
    <text x="0" y="15" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="900" font-style="italic" fill="url(#vs-grad)" text-anchor="middle">VS</text>
  </g>

  <!-- Connecting energy arcs -->
  <path d="M 120,90 Q 200,70 280,90" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="6 6" opacity="0.6" filter="url(#glow-purple)"/>
  <path d="M 120,100 Q 200,120 280,100" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 8" opacity="0.6" filter="url(#glow-cyan)"/>
</svg>
